name: Deploy to Firebase — Development (Staging)

on:
  push:
    branches:
      - dev
      - staging

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build for Firebase Dev
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyDmZet3rYi-2TZI-BjvQqtT3vj4eHfs5GI"
          VITE_FIREBASE_AUTH_DOMAIN: "resitalaina-o-matai-test.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "resitalaina-o-matai-test"
          VITE_FIREBASE_STORAGE_BUCKET: "resitalaina-o-matai-test.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "311164419027"
          VITE_FIREBASE_APP_ID: "1:311164419027:web:88315d6d154f2db9cc4d26"
          VITE_ENV: "development"
        run: |
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Dev Hosting + Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
          RESEND_API_KEY_VALUE: ${{ secrets.RESEND_API_KEY }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/service-account.json
          echo "RESEND_API_KEY=$RESEND_API_KEY_VALUE" > functions/.env
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/service-account.json
          cd functions && npm install && cd ..
          firebase functions:artifacts:setpolicy --project ${{ secrets.DEV_FIREBASE_PROJECT_ID }} --location australia-southeast1 --force 2>/dev/null || true
          firebase deploy --only hosting:resitalaina-o-matai-test,functions,firestore:rules --project ${{ secrets.DEV_FIREBASE_PROJECT_ID }} --non-interactive --force
