name: Deploy to Firebase — Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build for Firebase (root URL)
        env:
          REACT_APP_FIREBASE_API_KEY:            ${{ secrets.PROD_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN:        ${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID:         ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET:     ${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID:             ${{ secrets.PROD_FIREBASE_APP_ID }}
          REACT_APP_RECAPTCHA_SITE_KEY:          ${{ secrets.PROD_RECAPTCHA_SITE_KEY }}
          REACT_APP_ENV:                         production
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.homepage = '/';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting + Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY_VALUE: ${{ secrets.RESEND_API_KEY }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/service-account.json
          echo "RESEND_API_KEY=$RESEND_API_KEY_VALUE" > functions/.env
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/service-account.json
          cd functions && npm install && cd ..
          firebase functions:artifacts:setpolicy --project resitalaina-o-matai --force 2>/dev/null || true
          firebase deploy --only hosting:resitalaina-o-matai,functions,firestore:rules --project resitalaina-o-matai --non-interactive --force
